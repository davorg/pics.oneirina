<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oneirina Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111318;
      --panel: #1a1f29;
      --text: #f3f4f6;
      --muted: #b7bfcc;
      --accent: #8b5cf6;
      --border: #2a3140;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 14px;
      --content-width: 1200px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #0e1015 0%, #141923 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100%;
    }

    body.modal-open {
      overflow: hidden;
    }

    .page {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    header {
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      font-family: "Playfair Display", serif;
      letter-spacing: 0.02em;
    }

    .intro {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      max-width: 48rem;
    }

    .status {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      align-items: start;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(139, 92, 246, 0.75);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45);
      outline: none;
    }

    .thumb-wrap {
      aspect-ratio: 4 / 3;
      background: #0b0e13;
      overflow: hidden;
    }

    .thumb {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .caption {
      padding: 0.8rem 0.9rem 1rem;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(5, 7, 12, 0.95);
      z-index: 999;
      padding: 1rem;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      width: min(96vw, 1400px);
      height: min(94vh, 980px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
    }

    .lightbox-image-wrap {
      position: relative;
      flex: 1 1 auto;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
      user-select: none;
      -webkit-user-drag: none;
    }

    .lightbox-caption {
      flex: 0 0 auto;
      width: min(90vw, 900px);
      text-align: center;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.5;
      padding: 0.2rem 1rem 0;
    }

    .close-button {
      position: absolute;
      top: 0.25rem;
      right: 0.25rem;
      border: 0;
      border-radius: 999px;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      z-index: 5; /* ensure above nav zones */
    }

    .close-button:hover,
    .close-button:focus-visible {
      background: rgba(255, 255, 255, 0.2);
      outline: none;
    }

    .nav-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 33.333%;
      cursor: pointer;
      z-index: 2;
    }

    .nav-zone.left {
      left: 0;
    }

    .nav-zone.middle {
      left: 33.333%;
      cursor: zoom-out;
    }

    .nav-zone.right {
      right: 0;
    }

    .hint {
      position: absolute;
      bottom: calc(100% + 0.6rem);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.85rem;
      pointer-events: none;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .page {
        padding: 1.25rem 0.8rem 2rem;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 0.75rem;
      }

      .caption {
        font-size: 0.9rem;
      }

      .lightbox-inner {
        width: 100%;
        height: 100%;
      }

      .lightbox-caption {
        font-size: 0.95rem;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Oneirina Gallery</h1>
      <p class="intro">Fragments of a performance. Light, noise, and the space between them. Click an image to step inside.</p>
      <p id="status" class="status">Loading images…</p>
    </header>

    <section id="gallery" class="gallery" aria-live="polite"></section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <div class="lightbox-inner">
      <button id="closeButton" class="close-button" type="button" aria-label="Close image viewer">×</button>
      <div class="lightbox-image-wrap">
        <div class="hint">Left third: previous · Middle: close · Right third: next</div>
        <div class="nav-zone left" data-action="prev" aria-hidden="true"></div>
        <div class="nav-zone middle" data-action="close" aria-hidden="true"></div>
        <div class="nav-zone right" data-action="next" aria-hidden="true"></div>
        <img id="lightboxImage" alt="" />
      </div>
      <div id="lightboxCaption" class="lightbox-caption"></div>
    </div>
  </div>

  <script>
    const galleryEl = document.getElementById('gallery');
    const statusEl = document.getElementById('status');
    const lightboxEl = document.getElementById('lightbox');
    const lightboxImageEl = document.getElementById('lightboxImage');
    const lightboxCaptionEl = document.getElementById('lightboxCaption');
    const closeButtonEl = document.getElementById('closeButton');

    let images = [];
    let currentIndex = 0;

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normaliseImages(data) {
      if (!Array.isArray(data)) {
        throw new Error('images.json must contain a JSON array');
      }

      return data
        .filter(item => item && typeof item.filename === 'string')
        .map(item => ({
          filename: item.filename,
          caption: typeof item.caption === 'string' ? item.caption : ''
        }));
    }

    function renderGallery() {
      if (!images.length) {
        galleryEl.innerHTML = '';
        statusEl.textContent = 'No images found in images.json.';
        return;
      }

      const cards = images.map((item, index) => `
        <article class="card" tabindex="0" role="button" aria-label="Open image ${index + 1}: ${escapeHtml(item.caption || item.filename)}" data-index="${index}">
          <div class="thumb-wrap">
            <img class="thumb" src="${encodeURI(item.filename)}" alt="${escapeHtml(item.caption || '')}" loading="lazy" />
          </div>
          <div class="caption">${escapeHtml(item.caption || item.filename)}</div>
        </article>
      `).join('');

      galleryEl.innerHTML = cards;
      statusEl.textContent = `${images.length} image${images.length === 1 ? '' : 's'} loaded.`;
    }

    function openLightbox(index) {
      if (!images.length) return;

      currentIndex = ((index % images.length) + images.length) % images.length;
      const item = images[currentIndex];

      lightboxImageEl.src = item.filename;
      lightboxImageEl.alt = item.caption || `Image ${currentIndex + 1}`;
      lightboxCaptionEl.textContent = item.caption || item.filename;
      lightboxEl.classList.add('open');
      lightboxEl.setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');
      closeButtonEl.focus();
    }

    function closeLightbox() {
      lightboxEl.classList.remove('open');
      lightboxEl.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('modal-open');
    }

    function showNext() {
      openLightbox(currentIndex + 1);
    }

    function showPrev() {
      openLightbox(currentIndex - 1);
    }

    async function loadImages() {
      try {
        const response = await fetch('images.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Could not load images.json (${response.status})`);
        }
        const data = await response.json();
        images = normaliseImages(data);
        renderGallery();
      } catch (error) {
        console.error(error);
        statusEl.textContent = `Error: ${error.message}`;
      }
    }

    galleryEl.addEventListener('click', event => {
      const card = event.target.closest('.card');
      if (!card) return;
      openLightbox(Number(card.dataset.index));
    });

    galleryEl.addEventListener('keydown', event => {
      const card = event.target.closest('.card');
      if (!card) return;
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        openLightbox(Number(card.dataset.index));
      }
    });

    lightboxEl.addEventListener('click', event => {
      // If clicking the close button, let its own handler deal with it
      if (event.target.closest('.close-button')) {
        return;
      }

      const action = event.target.dataset.action;
      if (action === 'prev') {
        showPrev();
      } else if (action === 'next') {
        showNext();
      } else if (action === 'close' || event.target === lightboxEl) {
        closeLightbox();
      }
    });

    closeButtonEl.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', event => {
      if (!lightboxEl.classList.contains('open')) return;

      if (event.key === 'Escape') {
        closeLightbox();
      } else if (event.key === 'ArrowRight') {
        showNext();
      } else if (event.key === 'ArrowLeft') {
        showPrev();
      }
    });

    loadImages();
  </script>
</body>
</html>
