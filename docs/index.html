<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oneirina Gallery</title>
  <meta name="description" content="Fragments of a performance. Light, noise, and the space between them." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://pics.oneirina.com/" />
  <meta property="og:title" content="Oneirina Gallery" />
  <meta property="og:description" content="Fragments of a performance. Light, noise, and the space between them." />
  <meta property="og:image" content="https://pics.oneirina.com/img/the-soundscape.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Oneirina Gallery" />
  <meta name="twitter:description" content="Fragments of a performance. Light, noise, and the space between them." />
  <meta name="twitter:image" content="https://pics.oneirina.com/img/the-soundscape.png" />

  <!-- JSON-LD (populated dynamically after images.json loads) -->
  <script id="json-ld" type="application/ld+json"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header>
      <h1>Oneirina Gallery</h1>
      <p class="intro">Fragments of a performance. Light, noise, and the space between them. Click an image to step inside.</p>
      <p id="status" class="status">Loading images…</p>
    </header>

    <section id="gallery" class="gallery" aria-live="polite"></section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <div class="lightbox-inner">
      <button id="closeButton" class="close-button" type="button" aria-label="Close image viewer">×</button>
      <div class="lightbox-image-wrap">
        <div class="hint">Left third: previous · Middle: close · Right third: next</div>
        <div class="nav-zone left" data-action="prev" aria-hidden="true"></div>
        <div class="nav-zone middle" data-action="close" aria-hidden="true"></div>
        <div class="nav-zone right" data-action="next" aria-hidden="true"></div>
        <img id="lightboxImage" alt="" />
      </div>
      <div id="lightboxCaption" class="lightbox-caption"></div>
    </div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
